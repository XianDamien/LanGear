<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>LanGear - 语言学习引擎</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@500;700&family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          fontFamily: {
            'sans': ['"Source Sans 3"', 'sans-serif'],
            'pixel': ['"Pixelify Sans"', 'monospace'],
          },
          extend: {
            colors: {
              'brand-dark': '#f8fafc', /* Light canvas */
              'brand-panel': '#ffffff', /* Card surface */
              'brand-accent': '#ff4d2d', /* Energetic Red */
              'brand-accent-hover': '#e63b22', /* Deeper red for hover */
              'brand-light': '#ffffff',
              'brand-secondary': '#475569', /* Slate 600 */
              'brand-alert': '#ef4444', /* Alert red */
            },
            boxShadow: {
              'mech': '0 12px 30px rgba(15, 23, 42, 0.08)',
              'mech-sm': '0 6px 16px rgba(15, 23, 42, 0.08)',
            },
            animation: {
              'spin-slow': 'spin 8s linear infinite',
            }
          },
        }
      }
    </script>
    <style>
      body {
        font-family: "Source Sans 3", sans-serif;
        background-color: #f8fafc;
        color: #0f172a;
      }
      /* Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 10px;
      }
      ::-webkit-scrollbar-track {
        background: #e2e8f0;
      }
      ::-webkit-scrollbar-thumb {
        background: #ff4d2d;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #e63b22;
      }
      .noun-highlight {
        color: #2563eb;
        font-weight: bold;
        text-shadow: 0 1px 2px rgba(15, 23, 42, 0.08);
      }
      .verb-highlight {
        border-bottom: 2px solid #ff4d2d;
      }
      .font-pixel {
        font-family: "Pixelify Sans", monospace;
        font-weight: 500;
        font-size: 1.02em;
        letter-spacing: 0.01em;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/",
    "@google/genai": "https://esm.sh/@google/genai@^1.33.0",
    "lucide-react": "https://esm.sh/lucide-react@^0.561.0",
    "recharts": "https://esm.sh/recharts@^3.6.0",
    "react-router-dom": "https://esm.sh/react-router-dom@^7.10.1"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body>
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
